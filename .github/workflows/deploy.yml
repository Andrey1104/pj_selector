name: Deploy Static React via Password (Zero-Downtime)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install & Build React Static
      env:
        CI: false
      run: |
        npm ci
        npm run build

    - name: Upload Build Folder via Password (SCP)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "build/*"
        target: "/home/admin/web/chat.alis-is.com/public_html/build_next"
        strip_components: 1

    - name: Atomic Swap Build Folder
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          TARGET_DIR="/home/admin/web/chat.alis-is.com/public_html"
          if [ -d "$TARGET_DIR/build_next" ]; then
            mv $TARGET_DIR/build $TARGET_DIR/build_old || true
            mv $TARGET_DIR/build_next $TARGET_DIR/build
            rm -rf $TARGET_DIR/build_old
          else
            exit 1
          fi